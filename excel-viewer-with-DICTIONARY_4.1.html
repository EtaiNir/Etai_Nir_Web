<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול נתוני תלמידים - מאיר יפה ייעוץ אסטרטגי</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Rubik', sans-serif;
        }
        
        /* ── Password overlay ── */
        #passwordOverlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        #passwordBox {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 340px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            direction: rtl;
        }
        #passwordBox .lock-icon { font-size: 48px; margin-bottom: 12px; }
        #passwordBox h2 { font-size: 20px; font-weight: 700; color: #1e3a5f; margin-bottom: 6px; }
        #passwordBox p  { font-size: 13px; color: #666; margin-bottom: 24px; }
        #passwordInput {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            direction: ltr;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        #passwordInput:focus { border-color: #2d6a9f; }
        #passwordInput.error { border-color: #e53e3e; animation: shake 0.4s ease; }
        #passwordError { color: #e53e3e; font-size: 13px; margin-top: 8px; min-height: 18px; }
        #passwordSubmit {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: #2d6a9f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #passwordSubmit:hover { background: #1e3a5f; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-6px); }
            80%      { transform: translateX(6px); }
        }

        .drag-over {
            border-color: #4F46E5 !important;
            background-color: #EEF2FF !important;
        }

        /* Table styling */
        .table-container {
            overflow: auto;
            max-height: 70vh;
            border-radius: 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        .data-table th {
            background-color: #4F46E5;
            color: white;
            padding: 12px;
            text-align: right;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .data-table th:hover {
            background-color: #4338CA;
        }

        .data-table th.sorted-asc::after {
            content: ' ↑';
            font-size: 14px;
        }

        .data-table th.sorted-desc::after {
            content: ' ↓';
            font-size: 14px;
        }

        .data-table td {
            padding: 12px;
            border-bottom: 1px solid #E5E7EB;
        }

        .data-table tr:hover {
            background-color: #F3F4F6;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #F9FAFB;
        }

        .data-table tr.selected {
            background-color: #DBEAFE !important;
        }

        /* Editable cells */
        .data-table td[contenteditable="true"] {
            cursor: text;
            outline: none;
            transition: all 0.2s;
        }

        .data-table td[contenteditable="true"]:hover {
            background-color: #FEF3C7;
        }

        .data-table td[contenteditable="true"]:focus {
            background-color: #FFFBEB;
            border: 2px solid #F59E0B;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .is-edited {
            background-color: #FFFBEB !important;
            border-left: 3px solid #F59E0B !important;
        }

        /* Logo styling */
        .header-logo {
            max-height: 90px;
            width: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Print styles */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white !important;
            }
            .data-table th {
                background-color: #4F46E5 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* Column selector modal */
        .column-selector {
            max-height: 60vh;
            overflow-y: auto;
        }

        /* Combo columns */
        .combo-col-header {
            background-color: #7C3AED !important;
            min-width: 100px;
        }
        .combo-cell select {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            text-align: center;
            font-family: 'Rubik', sans-serif;
        }
        .combo-cell select.has-value {
            background-color: #ECFDF5;
            border-color: #10B981;
            font-weight: bold;
            color: #065F46;
        }
        .combo-header-btn {
            font-size: 10px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            color: white;
            cursor: pointer;
            padding: 1px 4px;
            margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>

    <script>
        // ========================================
        // STATE MANAGEMENT
        // ========================================
        let allData = [];
        let filteredData = [];
        let headers = [];
        let visibleCols = [];
        let currentPage = 0;
        let rowsPerPage = 50;
        let cardIndex = 0;
        let editedCells = {};
        let selectedRows = new Set();
        let sortColumn = null;
        let sortDirection = 'asc';
        // Combo columns (virtual columns with dropdown options)
        let comboColumns = []; // [{name: string, options: string[]}]
        let comboValues = {};  // {rowIdx: {colName: value}}
        let currentView = 'table';
        let columnDictionary = {}; // Column name mapping
        let dateColIndices = new Set(); // columns whose headers are Excel date serials

        // ========================================
        // FILE HANDLING
        // ========================================
        function setupEventListeners() {
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const searchInput = document.getElementById('searchInput');
            const dictInput = document.getElementById('dictInput');

            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) handleFile(e.target.files[0]);
            });

            // Dictionary upload
            dictInput.addEventListener('change', (e) => {
                if (e.target.files[0]) handleDictionaryFile(e.target.files[0]);
            });

            // Drag and drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });

            // Search
            searchInput.addEventListener('input', handleSearch);
        }

        async function handleFile(file) {
            if (!file) return;

            showLoading();
            editedCells = {};
            selectedRows = new Set();
            comboValues = {};
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const workbook = XLSX.read(e.target.result, { type: 'binary' });
                    const targetSheetName = 'מאז מנשה נתוני תלמידים';
                    const sheetName = workbook.SheetNames.includes(targetSheetName) 
                        ? targetSheetName 
                        : workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    headers = json[0] || [];
                    allData = json.slice(1);
                    filteredData = [...allData];

                    // Detect date-serial columns
                    dateColIndices = new Set();
                    headers.forEach((h, i) => {
                        if (isDateSerial(h)) dateColIndices.add(i);
                    });

                    // Default columns in specific order: שנת לימודים, סמל מוסד, שם מוסד, מספר זהות, שם משפחה, שם פרטי, מין, תאריך לידה, שכבה, מקבילה, שם רשות מגורים תלמיד, תאור ישוב 1ת, מספר נייד 1ת
                    const defaultColumnNames = [
                        'שם מוסד',
                        'שם משפחה',
                        'שם פרטי',
                        'שכבה',
                        'מקבילה',
                        'תאור ישוב 1ת',
                        'מספר נייד 1ת',
						'שם מלא1',
						'שם מלא2'
                    ];
                    
                    // Find column indices for the default columns
                    visibleCols = [];
                    defaultColumnNames.forEach(colName => {
                        const index = headers.findIndex(h => h && h.trim() === colName.trim());
                        if (index !== -1) {
                            visibleCols.push(index);
                        }
                    });
                    
                    // If none of the default columns found, fallback to first 10 columns
                    if (visibleCols.length === 0) {
                        visibleCols = headers.map((_, i) => i).slice(0, 10);
                    }

                    hideLoading();
                    document.getElementById('uploadZone').classList.add('hidden');
                    document.getElementById('actionPanel').classList.remove('hidden');
                    document.getElementById('searchBar').classList.remove('hidden');
                    
                    document.getElementById('fileStat').innerText = 
                        `מועצה אזורית מנשה: ${allData.length.toLocaleString()} רשומות • ${headers.length} עמודות`;
                    
                    // Populate column selects for column-specific search
                    populateColumnSelects();
                    
                    switchView('table');
                } catch (error) {
                    alert('שגיאה בקריאת הקובץ: ' + error.message);
                    hideLoading();
                }
            };
            reader.readAsBinaryString(file);
        }

        // ========================================
        // VIEW SWITCHING
        // ========================================
        function switchView(view) {
            currentView = view;
            
            // Toggle visibility
            document.getElementById('cardView').classList.toggle('hidden', view !== 'card');
            document.getElementById('tableView').classList.toggle('hidden', view !== 'table');
            document.getElementById('pagination').classList.toggle('hidden', view !== 'table');
            document.getElementById('rowsBtn').classList.toggle('hidden', view !== 'table');
            
            // Update button styles
            if (view === 'card') {
                document.getElementById('cardViewBtn').className = 'px-5 py-2.5 bg-white text-blue-700 rounded-md font-semibold shadow-sm text-sm';
                document.getElementById('tableViewBtn').className = 'px-5 py-2.5 text-blue-700 rounded-md font-semibold hover:bg-white hover:shadow-sm transition-all text-sm';
                renderCard();
            } else {
                document.getElementById('tableViewBtn').className = 'px-5 py-2.5 bg-white text-blue-700 rounded-md font-semibold shadow-sm text-sm';
                document.getElementById('cardViewBtn').className = 'px-5 py-2.5 text-blue-700 rounded-md font-semibold hover:bg-white hover:shadow-sm transition-all text-sm';
                renderTable();
            }
        }

        // ========================================
        // TABLE RENDERING
        // ========================================
        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';
            
            // Build header with sorting
            const headerRow = document.createElement('tr');
            
            // Checkbox column
            const checkTh = document.createElement('th');
            checkTh.innerHTML = '<input type="checkbox" id="selectAll" class="cursor-pointer">';
            checkTh.style.width = '40px';
            headerRow.appendChild(checkTh);
            
            // Row number column
            const numTh = document.createElement('th');
            numTh.textContent = '#';
            numTh.style.width = '60px';
            headerRow.appendChild(numTh);
            
            // Data columns
            visibleCols.forEach((colIdx, i) => {
                const th = document.createElement('th');
                th.textContent = getDisplayName(headers[colIdx], colIdx);
                th.dataset.col = colIdx;
                
                if (sortColumn === colIdx) {
                    th.classList.add(sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
                }
                
                th.addEventListener('click', () => sortTable(colIdx));
                headerRow.appendChild(th);
            });
            
            // Combo column headers
            comboColumns.forEach((col, idx) => {
                const th = document.createElement('th');
                th.className = 'combo-col-header';
                th.innerHTML = `${col.name} <button class="combo-header-btn" onclick="removeComboColumn(${idx})" title="מחק עמודה">✕</button>`;
                headerRow.appendChild(th);
            });

            thead.appendChild(headerRow);
            
            // Select all checkbox handler
            setTimeout(() => {
                document.getElementById('selectAll')?.addEventListener('change', handleSelectAll);
            }, 0);
            
            // Build body
            const start = currentPage * rowsPerPage;
            const end = Math.min(start + rowsPerPage, filteredData.length);
            
            for (let i = start; i < end; i++) {
                const row = filteredData[i];
                const absIdx = allData.indexOf(row);
                const tr = document.createElement('tr');
                tr.dataset.index = absIdx;
                
                if (selectedRows.has(absIdx)) {
                    tr.classList.add('selected');
                }
                
                // Checkbox cell
                const checkTd = document.createElement('td');
                checkTd.innerHTML = `<input type="checkbox" class="row-checkbox cursor-pointer" ${selectedRows.has(absIdx) ? 'checked' : ''}>`;
                checkTd.addEventListener('click', (e) => {
                    if (e.target.type === 'checkbox') {
                        toggleRowSelection(absIdx, e.target.checked);
                    }
                });
                tr.appendChild(checkTd);
                
                // Row number cell
                const numTd = document.createElement('td');
                numTd.textContent = i + 1;
                numTd.className = 'text-center text-gray-500 font-mono text-xs bg-gray-50';
                tr.appendChild(numTd);
                
                // Data cells (editable)
                visibleCols.forEach(colIdx => {
                    const key = `${absIdx}-${colIdx}`;
                    const rawValue = editedCells[key] !== undefined ? editedCells[key] : (row[colIdx] || '');
                    const value = formatCellValue(colIdx, rawValue);
                    const td = document.createElement('td');

                    if (dateColIndices.has(colIdx)) {
                        // Date column: render as combo select (✓ / ✗) like attendance
                        td.className = 'combo-cell';
                        const currentVal = (comboValues[absIdx] || {})[colIdx] || '';
                        const sel = document.createElement('select');
                        sel.dataset.comboRow = absIdx;
                        sel.dataset.comboCol = colIdx;
                        if (currentVal) sel.classList.add('has-value');
                        ['', '✓', '✗'].forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.textContent = opt || '—';
                            if (opt === currentVal) option.selected = true;
                            sel.appendChild(option);
                        });
                        sel.addEventListener('change', () => setComboValue(absIdx, colIdx, sel.value));
                        td.appendChild(sel);
                    } else {
                        td.textContent = value;
                        td.contentEditable = 'true';
                        td.dataset.row = absIdx;
                        td.dataset.col = colIdx;

                        if (editedCells[key] !== undefined) {
                            td.classList.add('is-edited');
                        }

                        td.addEventListener('blur', () => saveEdit(td, absIdx, colIdx));
                        td.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                td.blur();
                            }
                        });
                    }

                    tr.appendChild(td);
                });
                
                // Combo column cells
                comboColumns.forEach(col => {
                    const td = document.createElement('td');
                    td.className = 'combo-cell';
                    const currentVal = (comboValues[absIdx] || {})[col.name] || '';
                    const sel = document.createElement('select');
                    sel.dataset.comboRow = absIdx;
                    sel.dataset.comboCol = col.name;
                    if (currentVal) sel.classList.add('has-value');
                    col.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.textContent = opt || '—';
                        if (opt === currentVal) option.selected = true;
                        sel.appendChild(option);
                    });
                    sel.addEventListener('change', () => setComboValue(absIdx, col.name, sel.value));
                    td.appendChild(sel);
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            }
            
            updateTableNavigation();
        }

        // ========================================
        // CARD RENDERING
        // ========================================
        function renderCard() {
            const content = document.getElementById('cardContent');
            const record = filteredData[cardIndex];
            
            if (!record) {
                content.innerHTML = '<p class="text-gray-500">אין רשומות להצגה</p>';
                return;
            }
            
            content.innerHTML = headers.map((h, i) => {
                const rawVal = record[i];
                const value = rawVal !== undefined && rawVal !== null && rawVal !== ''
                    ? String(formatCellValue(i, rawVal))
                    : '-';
                return `
                    <div class="p-5 border-2 border-indigo-50 rounded-2xl bg-white hover:border-indigo-200 hover:shadow-md transition-all">
                        <label class="text-xs text-indigo-400 font-bold uppercase tracking-wider block mb-2">
                            ${getDisplayName(h, i)}
                        </label>
                        <div class="text-lg text-gray-800 font-medium break-words">
                            ${value}
                        </div>
                    </div>
                `;
            }).join('');
            
            updateCardNavigation();
        }

        // ========================================
        // SORTING
        // ========================================
        function sortTable(colIdx) {
            if (sortColumn === colIdx) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = colIdx;
                sortDirection = 'asc';
            }
            
            filteredData.sort((a, b) => {
                const valA = (a[colIdx] || '').toString().toLowerCase();
                const valB = (b[colIdx] || '').toString().toLowerCase();
                
                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            currentPage = 0;
            renderTable();
        }

        // ========================================
        // CELL EDITING
        // ========================================
        function saveEdit(element, rowIdx, colIdx) {
            const newValue = element.textContent.trim();
            const originalValue = (allData[rowIdx][colIdx] || '').toString().trim();
            
            if (newValue !== originalValue) {
                editedCells[`${rowIdx}-${colIdx}`] = newValue;
                element.classList.add('is-edited');
            } else {
                delete editedCells[`${rowIdx}-${colIdx}`];
                element.classList.remove('is-edited');
            }
        }

        // ========================================
        // ROW SELECTION
        // ========================================
        function toggleRowSelection(index, selected) {
            if (selected) {
                selectedRows.add(index);
            } else {
                selectedRows.delete(index);
            }
            updateSelectionCount();
        }

        function handleSelectAll(e) {
            const start = currentPage * rowsPerPage;
            const end = Math.min(start + rowsPerPage, filteredData.length);
            
            for (let i = start; i < end; i++) {
                const absIdx = allData.indexOf(filteredData[i]);
                if (e.target.checked) {
                    selectedRows.add(absIdx);
                } else {
                    selectedRows.delete(absIdx);
                }
            }
            
            renderTable();
        }

        function updateSelectionCount() {
            const count = selectedRows.size;
            const countEl = document.getElementById('selectedCount');
            const numEl = document.getElementById('selectedNum');
            
            if (count > 0) {
                countEl.classList.remove('hidden');
                numEl.textContent = count;
            } else {
                countEl.classList.add('hidden');
            }
        }

        // ========================================
        // SEARCH
        // ========================================
        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!term) {
                applyColumnFilters(); // Apply column filters if any exist
            } else {
                // Global search takes priority
                filteredData = allData.filter(row => 
                    row.some(cell => 
                        cell && cell.toString().toLowerCase().includes(term)
                    )
                );
                currentPage = 0;
                cardIndex = 0;
                selectedRows.clear();
                
                if (filteredData.length === 0) {
                    document.getElementById('tableView').classList.add('hidden');
                    document.getElementById('cardView').classList.add('hidden');
                    document.getElementById('noResults').classList.remove('hidden');
                } else {
                    document.getElementById('noResults').classList.add('hidden');
                    if (currentView === 'card') {
                        document.getElementById('cardView').classList.remove('hidden');
                        renderCard();
                    } else {
                        document.getElementById('tableView').classList.remove('hidden');
                        document.getElementById('pagination').classList.remove('hidden');
                        renderTable();
                    }
                }
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            applyColumnFilters(); // Reapply column filters after clearing global search
        }

        // ========================================
        // COLUMN-SPECIFIC SEARCH
        // ========================================
        function populateColumnSelects() {
            const selects = ['colSelect1', 'colSelect2', 'colSelect3'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                select.innerHTML = '<option value="">-- בחר עמודה --</option>';
                headers.forEach((header, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = getDisplayName(header, index);
                    select.appendChild(option);
                });
            });
        }

        function enableColumnSearch(columnNum) {
            const select = document.getElementById(`colSelect${columnNum}`);
            const input = document.getElementById(`colSearch${columnNum}`);
            
            if (select.value !== '') {
                input.disabled = false;
                input.focus();
            } else {
                input.disabled = true;
                input.value = '';
            }
            
            applyColumnFilters();
        }

        function applyColumnFilters() {
            // Get global search term
            const globalTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            // Start with all data or global search results
            let baseData = globalTerm ? 
                allData.filter(row => 
                    row.some(cell => 
                        cell && cell.toString().toLowerCase().includes(globalTerm)
                    )
                ) : [...allData];
            
            // Collect active column filters
            const activeFilters = [];
            for (let i = 1; i <= 3; i++) {
                const colIndex = document.getElementById(`colSelect${i}`).value;
                const searchTerm = document.getElementById(`colSearch${i}`).value.trim();
                
                if (colIndex !== '' && searchTerm !== '') {
                    activeFilters.push({
                        column: parseInt(colIndex),
                        term: searchTerm.toLowerCase(),
                        label: headers[colIndex] || `עמודה ${parseInt(colIndex) + 1}`
                    });
                }
            }
            
            // Apply column filters
            if (activeFilters.length > 0) {
                filteredData = baseData.filter(row => {
                    return activeFilters.every(filter => {
                        const cellValue = row[filter.column];
                        return cellValue && cellValue.toString().toLowerCase().includes(filter.term);
                    });
                });
                
                // Show active filters
                displayActiveFilters(activeFilters);
            } else {
                filteredData = baseData;
                document.getElementById('activeFilters').classList.add('hidden');
            }
            
            currentPage = 0;
            cardIndex = 0;
            selectedRows.clear();
            
            if (filteredData.length === 0) {
                document.getElementById('tableView').classList.add('hidden');
                document.getElementById('cardView').classList.add('hidden');
                document.getElementById('noResults').classList.remove('hidden');
            } else {
                document.getElementById('noResults').classList.add('hidden');
                if (currentView === 'card') {
                    document.getElementById('cardView').classList.remove('hidden');
                    renderCard();
                } else {
                    document.getElementById('tableView').classList.remove('hidden');
                    document.getElementById('pagination').classList.remove('hidden');
                    renderTable();
                }
            }
        }

        function displayActiveFilters(filters) {
            const container = document.getElementById('activeFilters');
            const list = document.getElementById('activeFiltersList');
            
            if (filters.length > 0) {
                list.innerHTML = filters.map(f => 
                    `<span class="inline-block bg-indigo-200 px-2 py-0.5 rounded text-xs">
                        ${f.label}: "${f.term}"
                    </span>`
                ).join('');
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function clearColumnFilters() {
            // Clear all column selects and inputs
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`colSelect${i}`).value = '';
                document.getElementById(`colSearch${i}`).value = '';
                document.getElementById(`colSearch${i}`).disabled = true;
            }
            
            // Reapply filters (will just use global search if any)
            applyColumnFilters();
        }

        // ========================================
        // DATE UTILITIES
        // ========================================
        const HEBREW_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                               'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
        const DATE_SERIAL_MIN = 36526; // Jan 1 2000
        const DATE_SERIAL_MAX = 73050; // Dec 31 2099

        function isDateSerial(v) {
            return typeof v === 'number' && isFinite(v)
                && Math.floor(v) >= DATE_SERIAL_MIN && Math.floor(v) <= DATE_SERIAL_MAX;
        }

        function formatHebrewDate(serial) {
            const d = new Date((Math.floor(serial) - 25569) * 86400 * 1000);
            return `${d.getUTCDate()} ${HEBREW_MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
        }

        function formatCellValue(colIdx, value) {
            if (dateColIndices.has(colIdx) && isDateSerial(value)) {
                return formatHebrewDate(value);
            }
            return value;
        }

        // ========================================
        // DICTIONARY MANAGEMENT
        // ========================================
        function getDisplayName(originalName, index) {
            // Return mapped name if exists, otherwise original
            if (columnDictionary[originalName]) {
                return columnDictionary[originalName];
            }
            if (isDateSerial(originalName)) {
                return formatHebrewDate(originalName);
            }
            return originalName || `עמודה ${index + 1}`;
        }

        async function handleDictionaryFile(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let mappings = [];
                    
                    if (file.name.endsWith('.csv')) {
                        // Parse CSV
                        const text = e.target.result;
                        const lines = text.split('\n');
                        mappings = lines.slice(1).map(line => {
                            const parts = line.split(',').map(p => p.trim());
                            return { original: parts[0], display: parts[1] };
                        }).filter(m => m.original && m.display);
                    } else {
                        // Parse Excel
                        const workbook = XLSX.read(e.target.result, { type: 'binary' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        
                        // Expecting format: Column 1 = Original Name, Column 2 = Display Name
                        mappings = json.slice(1).map(row => ({
                            original: row[0],
                            display: row[1]
                        })).filter(m => m.original && m.display);
                    }
                    
                    // Build dictionary
                    columnDictionary = {};
                    mappings.forEach(m => {
                        columnDictionary[m.original] = m.display;
                    });
                    
                    // Show success message
                    alert(`✓ מילון נטען בהצלחה!\n${mappings.length} מיפויים נטענו`);
                    
                    // Show clear button
                    document.getElementById('clearDictBtn').classList.remove('hidden');
                    
                    // Refresh current view
                    populateColumnSelects();
                    if (currentView === 'card') {
                        renderCard();
                    } else {
                        renderTable();
                    }
                } catch (error) {
                    alert('שגיאה בקריאת קובץ המילון: ' + error.message);
                }
            };
            
            if (file.name.endsWith('.csv')) {
                reader.readAsText(file);
            } else {
                reader.readAsBinaryString(file);
            }
        }

        function clearDictionary() {
            if (confirm('האם למחוק את המילון?')) {
                columnDictionary = {};
                document.getElementById('clearDictBtn').classList.add('hidden');
                
                // Refresh views
                populateColumnSelects();
                if (currentView === 'card') {
                    renderCard();
                } else {
                    renderTable();
                }
                
                alert('✓ המילון נמחק');
            }
        }


        // ========================================
        // NAVIGATION
        // ========================================
        function changePage(dir) {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
            renderTable();
        }

        function navigateCard(dir) {
            cardIndex = Math.max(0, Math.min(filteredData.length - 1, cardIndex + dir));
            renderCard();
        }

        function updateTableNavigation() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const start = currentPage * rowsPerPage + 1;
            const end = Math.min((currentPage + 1) * rowsPerPage, filteredData.length);
            
            document.getElementById('pageIndicator').textContent = 
                `עמוד ${currentPage + 1} מתוך ${totalPages} • מציג ${start}-${end} מתוך ${filteredData.length.toLocaleString()}`;
            
            document.getElementById('prevPageBtn').disabled = currentPage === 0;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages - 1;
        }

        function updateCardNavigation() {
            document.getElementById('cardCurrentNum').textContent = cardIndex + 1;
            document.getElementById('cardTotalNum').textContent = filteredData.length;
            document.getElementById('cardNavCurrent').textContent = cardIndex + 1;
            document.getElementById('cardNavTotal').textContent = filteredData.length;
            
            document.getElementById('cardPrevBtn').disabled = cardIndex === 0;
            document.getElementById('cardNextBtn').disabled = cardIndex >= filteredData.length - 1;
            
            if (filteredData.length < allData.length) {
                document.getElementById('cardFilterInfo').classList.remove('hidden');
                document.getElementById('cardFilteredNum').textContent = filteredData.length;
            } else {
                document.getElementById('cardFilterInfo').classList.add('hidden');
            }
        }

            }
        }

        // ========================================
        // COMBO COLUMNS
        // ========================================
        // ── localStorage persistence ──────────────────────────────────
        const COMBO_STORAGE_KEY = 'excel-viewer-combo-state';

        function saveComboState() {
            try {
                localStorage.setItem(COMBO_STORAGE_KEY, JSON.stringify({ comboColumns, comboValues }));
            } catch(e) {}
        }

        function loadComboState() {
            try {
                const saved = localStorage.getItem(COMBO_STORAGE_KEY);
                if (!saved) return;
                const { comboColumns: cols, comboValues: vals } = JSON.parse(saved);
                if ((cols && cols.length > 0) || Object.keys(vals || {}).length > 0) {
                    comboColumns = cols || [];
                    comboValues = vals || {};
                }
            } catch(e) {}
        }

        function addComboColumn() {
            const name = prompt('שם העמודה החדשה (לדוגמה: "אושר", "בדוק", "העברה"):', '');
            if (!name || !name.trim()) return;

            const optionsInput = prompt(
                'אפשרויות הרשימה (מופרדות בפסיק):\nלדוגמה: ✓,✗ או כן,לא,ממתין',
                '✓,✗'
            );
            if (optionsInput === null) return;

            const options = ['', ...optionsInput.split(',').map(o => o.trim()).filter(o => o)];
            comboColumns.push({ name: name.trim(), options });
            saveComboState();
            renderTable();
        }

        function removeComboColumn(idx) {
            if (!confirm(`למחוק את עמודת הסימון "${comboColumns[idx].name}"?`)) return;
            const colName = comboColumns[idx].name;
            comboColumns.splice(idx, 1);
            // Clean up values
            Object.keys(comboValues).forEach(rowIdx => {
                delete comboValues[rowIdx][colName];
            });
            saveComboState();
            renderTable();
        }

        function setComboValue(rowIdx, colName, value) {
            if (!comboValues[rowIdx]) comboValues[rowIdx] = {};
            comboValues[rowIdx][colName] = value;
            saveComboState();
            // Update the select element style
            const sel = document.querySelector(`select[data-combo-row="${rowIdx}"][data-combo-col="${colName}"]`);
            if (sel) {
                sel.classList.toggle('has-value', value !== '');
            }
        }

        function exportToExcel() {
            // Build source list with stable absIdx references
            const sourceRows = selectedRows.size > 0
                ? Array.from(selectedRows).map(i => ({ row: allData[i], absIdx: i }))
                : filteredData.map(row => ({ row, absIdx: allData.indexOf(row) }));

            const dateColHeaders = Array.from(dateColIndices)
                .filter(ci => !visibleCols.includes(ci))
                .map(ci => formatCellValue(ci, headers[ci]));
            const exportHeaders = [
                ...(visibleCols.length > 0
                    ? visibleCols.map(i => getDisplayName(headers[i], i))
                    : headers.map((h, i) => getDisplayName(h, i))),
                ...comboColumns.map(c => c.name),
                ...dateColHeaders
            ];

            const exportRows = sourceRows.map(({ row, absIdx }) => {
                // Apply any in-app edits
                const baseRow = [...row];
                headers.forEach((_, cIdx) => {
                    const key = `${absIdx}-${cIdx}`;
                    if (editedCells[key] !== undefined) baseRow[cIdx] = editedCells[key];
                });
                const baseCols = visibleCols.length > 0
                    ? visibleCols.map(i => {
                        if (dateColIndices.has(i)) {
                            return (comboValues[absIdx] || {})[i] || '';
                        }
                        const key = `${absIdx}-${i}`;
                        return editedCells[key] !== undefined ? editedCells[key] : (baseRow[i] || '');
                    })
                    : baseRow;
                // Combo column values (tick marks etc.)
                const comboCols = comboColumns.map(col => (comboValues[absIdx] || {})[col.name] || '');
                // Date column combo values (attendance marks for date columns not already in visibleCols)
                const dateMarks = Array.from(dateColIndices)
                    .filter(ci => !visibleCols.includes(ci))
                    .map(ci => (comboValues[absIdx] || {})[ci] || '');
                return [...baseCols, ...comboCols, ...dateMarks];
            });

            const ws = XLSX.utils.aoa_to_sheet([exportHeaders, ...exportRows]);

            // Apply date number format to date columns in export
            visibleCols.forEach((colIdx, exportPos) => {
                if (!dateColIndices.has(colIdx)) return;
                for (let rowNum = 1; rowNum <= exportRows.length; rowNum++) {
                    const cellAddr = XLSX.utils.encode_cell({ r: rowNum, c: exportPos });
                    if (ws[cellAddr]) {
                        ws[cellAddr].t = 'n';
                        ws[cellAddr].z = 'DD/MM/YYYY';
                    }
                }
            });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'נתונים');

            const _now = new Date();
            const _date = _now.toISOString().split('T')[0];
            const _time = _now.toTimeString().slice(0,8).replace(/:/g,'-');
            const filename = `ייצוא_נתונים_מאיר_יפה_${_date}_${_time}.xlsx`;
            XLSX.writeFile(wb, filename);

            closeExportModal();
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            const dataToExport = selectedRows.size > 0 
                ? Array.from(selectedRows).map(i => allData[i])
                : filteredData;
            
            const exportHeaders = visibleCols.length > 0 
                ? visibleCols.map(i => getDisplayName(headers[i], i))
                : headers.slice(0, 10).map((h, i) => getDisplayName(h, i)); // Limit for PDF
            
            const rows = dataToExport.map((row, idx) => {
                const absIdx = allData.indexOf(row);
                return [
                    (idx + 1).toString(),
                    ...(visibleCols.length > 0 
                        ? visibleCols.map(ci => {
                            if (dateColIndices.has(ci)) {
                                return (comboValues[absIdx] || {})[ci] || '';
                            }
                            const key = `${absIdx}-${ci}`;
                            const v = editedCells[key] !== undefined ? editedCells[key] : (row[ci] || '');
                            return formatCellValue(ci, v);
                        })
                        : row.slice(0, 10).map(cell => cell || '')
                    )
                ];
            });
            
            doc.autoTable({
                head: [['#', ...exportHeaders]],
                body: rows,
                styles: { font: 'helvetica', fontSize: 8 },
                headStyles: { fillColor: [79, 70, 229] },
                margin: { top: 10 }
            });
            
            const _pdfNow = new Date();
            const _pdfDate = _pdfNow.toISOString().split('T')[0];
            const _pdfTime = _pdfNow.toTimeString().slice(0,8).replace(/:/g,'-');
            doc.save(`ייצוא_PDF_מאיר_יפה_${_pdfDate}_${_pdfTime}.pdf`);
            
            closeExportModal();
        }

        // ========================================
        // LOADING STATES
        // ========================================
        function showLoading() {
            document.getElementById('loadingState').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingState').classList.add('hidden');
        }

        // ========================================
        // PASSWORD PROTECTION
        // ========================================
        (function() {
            const HASH = '341861edca82fcfa8308b009690da2b9a1500fcb56b22ecca768f8413f9b33d9';

            async function sha256(str) {
                const buf = await crypto.subtle.digest(
                    'SHA-256',
                    new TextEncoder().encode(str)
                );
                return Array.from(new Uint8Array(buf))
                    .map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function checkPassword() {
                const input = document.getElementById('passwordInput');
                const error = document.getElementById('passwordError');
                const val   = input.value;
                if (!val) { error.textContent = 'נא להזין סיסמה'; return; }
                const hash = await sha256(val);
                if (hash === HASH) {
                    document.getElementById('passwordOverlay').style.display = 'none';
                    error.textContent = '';
                    // Auto-trigger file selection for the predefined sheet
                    setTimeout(() => document.getElementById('fileInput').click(), 300);
                } else {
                    error.textContent = 'סיסמה שגויה, נסה שוב';
                    input.classList.remove('error');
                    void input.offsetWidth; // force reflow to restart animation
                    input.classList.add('error');
                    input.value = '';
                    input.focus();
                }
            }

            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('passwordSubmit').addEventListener('click', checkPassword);
                document.getElementById('passwordInput').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') checkPassword();
                });
                // Focus input automatically
                setTimeout(() => document.getElementById('passwordInput').focus(), 100);
            });
        })();

        // ========================================
        // INITIALIZATION
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            loadComboState();
            setupEventListeners();
        });
    </script>
</body>
</html>
